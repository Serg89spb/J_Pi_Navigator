slam_toolbox:
  ros__parameters:
    use_sim_time: false
    odom_frame: odom
    base_frame: base_link
    scan_topic: /scan
    mode: mapping
    stack_size_to_use: 40000000
    transform_timeout: 0.2
    minimum_time_interval: 0.1
    minimum_travel_distance: 0.01
    minimum_travel_heading: 0.01
    map_update_interval: 1.0